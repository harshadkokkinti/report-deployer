<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Deployer — Olly</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #08091A; --bg1: #0D0F24; --bg2: #13162E; --bg3: #191C38;
      --text: #F0EFFF; --text2: #C2C2D8; --text3: #8A8AA6;
      --blue: #3B7BE8; --blue-light: #6FA3FF;
      --teal: #0FA88A; --teal-bg: rgba(15,168,138,0.1); --teal-border: rgba(15,168,138,0.25);
      --red: #C9274A; --red-bg: rgba(201,39,74,0.1); --red-border: rgba(201,39,74,0.25);
      --green-bg: rgba(15,168,138,0.12); --green-border: rgba(15,168,138,0.3);
      --line: rgba(240,239,255,0.07);
      --sans: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 60px 20px 80px; }
    .wrap { width: 100%; max-width: 900px; }
    header { margin-bottom: 40px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .logo { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; }
    h1 { font-size: 34px; font-weight: 500; line-height: 1.15; margin-bottom: 8px; }
    h1 span { color: var(--blue-light); }
    .tagline { font-size: 15px; color: var(--text3); font-weight: 300; }
    .logout-btn {
      flex-shrink: 0; margin-top: 4px; font-size: 12px; color: var(--text3); text-decoration: none;
      border: 1px solid var(--line); border-radius: 8px; padding: 6px 12px; transition: color .2s, border-color .2s;
    }
    .logout-btn:hover { color: var(--text); border-color: rgba(240,239,255,0.2); }
    .card { background: var(--bg1); border: 1px solid var(--line); border-radius: 18px; padding: 28px; margin-bottom: 18px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .card-title { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); }
    .refresh-btn {
      font-size: 12px; color: var(--text3); background: transparent; border: 1px solid var(--line);
      border-radius: 8px; padding: 5px 12px; cursor: pointer; font-family: var(--sans);
      transition: color .2s, border-color .2s;
    }
    .refresh-btn:hover { color: var(--text); border-color: rgba(240,239,255,0.2); }
    .sheet-wrap {
      border-radius: 10px; overflow: hidden; border: 1px solid var(--line);
      background: var(--bg2); min-height: 520px; display: flex; align-items: center; justify-content: center;
    }
    .sheet-wrap iframe { width: 100%; height: 560px; border: none; display: block; }
    .no-sheet { font-size: 13px; color: var(--text3); text-align: center; padding: 60px 20px; }
    .trigger-wrap { margin-bottom: 18px; }
    .trigger-btn {
      width: 100%; padding: 16px; background: linear-gradient(135deg, #3B7BE8, #8B3FD9);
      color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: var(--sans); transition: opacity .2s, transform .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .trigger-btn:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
    .trigger-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .trigger-status {
      display: none; margin-top: 12px; padding: 12px 16px; border-radius: 10px;
      font-size: 13px; text-align: center;
    }
    .trigger-status.success { display: block; background: var(--green-bg); border: 1px solid var(--green-border); color: var(--teal); }
    .trigger-status.error { display: block; background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red); }
    .pages-empty { font-size: 13px; color: var(--text3); text-align: center; padding: 24px 0; }
    .pages-list { display: flex; flex-direction: column; gap: 8px; }
    .search-row { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
    .search-wrap { position: relative; flex: 1; }
    .search-input {
      width: 100%; background: var(--bg2); border: 1px solid var(--line); border-radius: 10px;
      padding: 9px 36px 9px 14px; font-size: 13px; color: var(--text); font-family: var(--sans);
      outline: none; transition: border-color .2s;
    }
    .search-input::placeholder { color: var(--text3); }
    .search-input:focus { border-color: rgba(59,123,232,0.5); }
    .search-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px;
      line-height: 1; padding: 0; display: none;
    }
    .suggestions {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 50;
      background: var(--bg1); border: 1px solid var(--line); border-radius: 10px;
      overflow: hidden; display: none;
    }
    .suggestion-item {
      padding: 9px 14px; font-size: 13px; color: var(--text2); cursor: pointer;
      transition: background .15s;
    }
    .suggestion-item:hover, .suggestion-item.active { background: var(--bg3); color: var(--text); }
    .suggestion-item mark { background: none; color: var(--blue-light); font-weight: 600; }
    .export-btn {
      flex-shrink: 0; font-size: 12px; color: var(--text2); background: transparent;
      border: 1px solid var(--line); border-radius: 8px; padding: 8px 14px; cursor: pointer;
      font-family: var(--sans); white-space: nowrap; transition: color .2s, border-color .2s;
      display: flex; align-items: center; gap: 6px;
    }
    .export-btn:hover { color: var(--text); border-color: rgba(240,239,255,0.2); }
    .pagination { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 16px; }
    .pagination-info { font-size: 12px; color: var(--text3); }
    .pagination-controls { display: flex; align-items: center; gap: 8px; }
    .page-btn {
      font-size: 12px; color: var(--text2); background: transparent; border: 1px solid var(--line);
      border-radius: 8px; padding: 5px 12px; cursor: pointer; font-family: var(--sans);
      transition: color .2s, border-color .2s;
    }
    .page-btn:hover:not(:disabled) { color: var(--text); border-color: rgba(240,239,255,0.2); }
    .page-btn:disabled { opacity: .35; cursor: not-allowed; }
    .page-indicator { font-size: 12px; color: var(--text3); min-width: 60px; text-align: center; }
    .page-row {
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      padding: 12px 16px; background: var(--bg2); border-radius: 10px; transition: background .15s;
    }
    .page-row:hover { background: var(--bg3); }
    .page-info { overflow: hidden; }
    .page-brand { font-size: 13px; font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 2px; }
    .page-uuid { font-family: var(--mono); font-size: 10px; color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .page-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .page-link { font-size: 12px; color: var(--blue-light); text-decoration: none; }
    .page-link:hover { text-decoration: underline; }
    .page-del { font-size: 12px; color: var(--red); background: none; border: none; cursor: pointer; padding: 0; font-family: var(--sans); }
    .page-del:hover { text-decoration: underline; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin .65s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="logo">Olly — Report Deployer</div>
        <h1>Reports <span>Dashboard</span></h1>
        <p class="tagline">Manage and trigger online reputation reports.</p>
      </div>
      <a href="/__ADMIN_PATH__/logout" class="logout-btn">Logout</a>
    </header>

    <!-- Google Sheet -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Report Data</div>
        <button class="refresh-btn" onclick="reloadSheet()">↻ Refresh</button>
      </div>
      <div class="sheet-wrap" id="sheet-wrap">
        <iframe id="sheet-frame"></iframe>
      </div>
    </div>

    <!-- Trigger -->
    <div class="trigger-wrap">
      <button class="trigger-btn" id="trigger-btn" onclick="triggerReport()">
        Trigger Report
      </button>
      <div class="trigger-status" id="trigger-status"></div>
    </div>

    <!-- Deployed pages -->
    <div class="card">
      <div class="card-header" style="margin-bottom:14px">
        <div class="card-title">Deployed Pages</div>
        <span id="pages-count" style="font-size:12px;color:var(--text3)"></span>
      </div>
      <div class="search-row">
        <div class="search-wrap">
          <input class="search-input" id="search-input" type="text" placeholder="Search by brand name…" autocomplete="off"
            oninput="onSearchInput(this.value)" onkeydown="onSearchKey(event)">
          <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
          <div class="suggestions" id="suggestions"></div>
        </div>
        <button class="export-btn" onclick="exportCsv()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v7M3.5 5.5l3 3 3-3M1.5 10.5h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Export CSV
        </button>
      </div>
      <div id="pages-container">
        <div class="pages-empty">Loading…</div>
      </div>
      <div class="pagination" id="pagination" style="display:none">
        <span class="pagination-info" id="pagination-info"></span>
        <div class="pagination-controls">
          <button class="page-btn" id="btn-prev" onclick="changePage(-1)">← Prev</button>
          <span class="page-indicator" id="page-indicator"></span>
          <button class="page-btn" id="btn-next" onclick="changePage(1)">Next →</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SHEET_URL = '__SHEET_EMBED_URL__';
    const PAGE_SIZE  = 10;
    let currentPage  = 1;
    let allBrands    = [];
    let activeSugIdx = -1;

    // ── Sheet ──────────────────────────────────────────────────────────────────
    function buildSheetSrc() {
      if (!SHEET_URL) return '';
      return SHEET_URL + (SHEET_URL.includes('?') ? '&' : '?') + 't=' + Date.now();
    }
    function reloadSheet() {
      const src = buildSheetSrc();
      const wrap = document.getElementById('sheet-wrap');
      if (!src) { wrap.innerHTML = '<div class="no-sheet">No GOOGLE_SHEET_URL configured.<br>Add it to your environment variables.</div>'; return; }
      document.getElementById('sheet-frame').src = src;
    }

    // ── Trigger ────────────────────────────────────────────────────────────────
    async function triggerReport() {
      const btn = document.getElementById('trigger-btn');
      const status = document.getElementById('trigger-status');
      status.className = 'trigger-status';
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>Triggering…';
      try {
        const res = await fetch('https://askolly.app.n8n.cloud/webhook/onlinereputation-report-trigger', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ start: 'true' }),
        });
        status.textContent = res.ok ? 'Report triggered successfully!' : `Trigger failed: HTTP ${res.status}`;
        status.className   = 'trigger-status ' + (res.ok ? 'success' : 'error');
      } catch {
        status.textContent = 'Network error — could not reach the trigger endpoint.';
        status.className   = 'trigger-status error';
      } finally {
        btn.disabled = false; btn.textContent = 'Trigger Report';
        setTimeout(() => { status.className = 'trigger-status'; }, 6000);
      }
    }

    // ── Delete ─────────────────────────────────────────────────────────────────
    async function deletePage(uuid, brandName) {
      if (!confirm(`Delete report for "${brandName}"?`)) return;
      try {
        const res = await fetch(`/api/pages/${uuid}`, { method: 'DELETE' });
        if (res.ok) {
          allBrands = allBrands.filter(b => b.uuid !== uuid);
          const q = document.getElementById('search-input').value.trim();
          q ? renderSearchResults(q) : loadPages(currentPage);
        } else { const d = await res.json(); alert(d.error); }
      } catch { alert('Delete failed'); }
    }

    // ── Brands cache ───────────────────────────────────────────────────────────
    async function loadBrands() {
      try {
        const res = await fetch('/api/brands');
        const data = await res.json();
        allBrands = data.brands || [];
      } catch {}
    }

    // ── Search helpers ─────────────────────────────────────────────────────────
    function highlight(text, q) {
      if (!q) return text;
      const idx = text.toLowerCase().indexOf(q.toLowerCase());
      if (idx === -1) return text;
      return text.slice(0, idx) + '<mark>' + text.slice(idx, idx + q.length) + '</mark>' + text.slice(idx + q.length);
    }

    function onSearchInput(val) {
      document.getElementById('search-clear').style.display = val ? 'block' : 'none';
      activeSugIdx = -1;
      if (!val.trim()) { hideSuggestions(); loadPages(1); return; }
      const q = val.toLowerCase();
      const matches = allBrands.filter(b => b.brand_name.toLowerCase().includes(q)).slice(0, 8);
      const box = document.getElementById('suggestions');
      if (!matches.length) { hideSuggestions(); renderSearchResults(val); return; }
      box.innerHTML = matches.map((b, i) =>
        `<div class="suggestion-item" data-idx="${i}" onmousedown="selectSuggestion('${b.brand_name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
          ${highlight(b.brand_name, val)}
        </div>`
      ).join('');
      box.style.display = 'block';
      renderSearchResults(val);
    }

    function onSearchKey(e) {
      const items = document.getElementById('suggestions').querySelectorAll('.suggestion-item');
      if (!items.length) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); activeSugIdx = Math.min(activeSugIdx + 1, items.length - 1); updateActiveSug(items); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); activeSugIdx = Math.max(activeSugIdx - 1, 0); updateActiveSug(items); }
      else if (e.key === 'Enter' && activeSugIdx >= 0) { e.preventDefault(); items[activeSugIdx].dispatchEvent(new MouseEvent('mousedown')); }
      else if (e.key === 'Escape') clearSearch();
    }

    function updateActiveSug(items) { items.forEach((el, i) => el.classList.toggle('active', i === activeSugIdx)); }

    function selectSuggestion(brandName) {
      const input = document.getElementById('search-input');
      input.value = brandName;
      document.getElementById('search-clear').style.display = 'block';
      hideSuggestions();
      renderSearchResults(brandName);
    }

    function hideSuggestions() {
      const box = document.getElementById('suggestions');
      box.style.display = 'none'; box.innerHTML = ''; activeSugIdx = -1;
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      document.getElementById('search-clear').style.display = 'none';
      hideSuggestions(); loadPages(1);
    }

    document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) hideSuggestions(); });

    function renderSearchResults(query) {
      const q = query.toLowerCase();
      const matches = allBrands.filter(b => b.brand_name.toLowerCase().includes(q));
      const container = document.getElementById('pages-container');
      const countLabel = document.getElementById('pages-count');
      document.getElementById('pagination').style.display = 'none';
      countLabel.textContent = matches.length ? `${matches.length} match${matches.length !== 1 ? 'es' : ''}` : '';
      if (!matches.length) { container.innerHTML = '<div class="pages-empty">No matching reports found.</div>'; return; }
      container.innerHTML = `<div class="pages-list">${matches.map(p => {
        const brand = p.brand_name || 'Unknown';
        const safeBrand = brand.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        const ts = p.deployed_at ? new Date(p.deployed_at).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }) : '—';
        return `<div class="page-row">
          <div class="page-info">
            <div class="page-brand">${highlight(brand, query)}</div>
            <div class="page-uuid">${ts} &nbsp;·&nbsp; ${p.uuid}</div>
          </div>
          <div class="page-actions">
            <a class="page-link" href="${p.url}" target="_blank">Open →</a>
            <button class="page-del" onclick="deletePage('${p.uuid}','${safeBrand}')">Delete</button>
          </div>
        </div>`;
      }).join('')}</div>`;
    }

    // ── Export CSV ─────────────────────────────────────────────────────────────
    function exportCsv() {
      if (!allBrands.length) { alert('No reports to export.'); return; }
      const rows = [['Brand Name', 'Report URL'], ...allBrands.map(b => [`"${b.brand_name.replace(/"/g, '""')}"`, `"${b.url}"`])];
      const csv  = rows.map(r => r.join(',')).join('\r\n');
      const a    = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' })),
        download: 'olly-reports.csv',
      });
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    // ── Paginated list ─────────────────────────────────────────────────────────
    function changePage(delta) { loadPages(currentPage + delta); }

    async function loadPages(page = 1) {
      currentPage = page;
      const container  = document.getElementById('pages-container');
      const pagination = document.getElementById('pagination');
      const countLabel = document.getElementById('pages-count');
      container.innerHTML = '<div class="pages-empty">Loading…</div>';
      pagination.style.display = 'none';
      try {
        const res  = await fetch(`/api/pages?page=${page}&limit=${PAGE_SIZE}`);
        const data = await res.json();
        const total = data.total || 0, totalPages = data.totalPages || 1, safePage = data.page || 1;
        countLabel.textContent = total ? `${total} report${total !== 1 ? 's' : ''}` : '';
        if (!data.pages || !data.pages.length) { container.innerHTML = '<div class="pages-empty">No pages deployed yet.</div>'; return; }
        container.innerHTML = `<div class="pages-list">${data.pages.map(p => {
          const brand = p.brand_name || 'Unknown';
          const safeBrand = brand.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
          const ts = p.deployed_at ? new Date(p.deployed_at).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }) : '—';
          return `<div class="page-row">
            <div class="page-info">
              <div class="page-brand">${brand}</div>
              <div class="page-uuid">${ts} &nbsp;·&nbsp; ${p.uuid}</div>
            </div>
            <div class="page-actions">
              <a class="page-link" href="${p.url}" target="_blank">Open →</a>
              <button class="page-del" onclick="deletePage('${p.uuid}','${safeBrand}')">Delete</button>
            </div>
          </div>`;
        }).join('')}</div>`;
        if (totalPages > 1) {
          const from = (safePage - 1) * PAGE_SIZE + 1, to = Math.min(safePage * PAGE_SIZE, total);
          document.getElementById('pagination-info').textContent = `${from}–${to} of ${total}`;
          document.getElementById('page-indicator').textContent  = `${safePage} / ${totalPages}`;
          document.getElementById('btn-prev').disabled = safePage <= 1;
          document.getElementById('btn-next').disabled = safePage >= totalPages;
          pagination.style.display = 'flex';
        }
      } catch { container.innerHTML = '<div class="pages-empty">Could not load pages.</div>'; }
    }

    reloadSheet();
    loadBrands();
    loadPages();
  </script>
</body>
</html>
